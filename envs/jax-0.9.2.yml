# Conda environment for simsopt JAX development.
# All Python dependency versions are defined in pyproject.toml (SSOT).
# Conda resolves pip editables relative to this env file, so point explicitly
# at the repo root editable JAX dev install (including ruff).
name: jax-0.9.2
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Build toolchain (conda-native, not pip)
  - cmake
  - ninja
  - pybind11<3
  - pip:
      - -e "..[JAX,dev]"
