# Conda environment for simsopt JAX development.
# All Python dependency versions are defined in pyproject.toml (SSOT).
# This file only adds conda-specific packages (compilers, system libs).
# Install simsopt and the desired JAX extras separately after activation.
name: jax-0.9.2
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Build toolchain (conda-native, not pip)
  - cmake
  - ninja
  - pybind11<3
