name: JAX GPU Parity

# Weekly GPU parity check + manual dispatch.
# Validates that core JAX modules produce correct results on a real GPU,
# catching silent numerical divergence between CPU and CUDA backends.

on:
  workflow_dispatch:
  schedule:
    # Sunday midnight UTC
    - cron: "0 0 * * 0"

jobs:
  gpu-parity:
    name: GPU parity (CUDA, JAX 0.9.2)
    runs-on: [self-hosted, gpu]
    timeout-minutes: 30

    env:
      PYTHONPATH: src
      SIMSOPT_BACKEND_MODE: jax_gpu_parity
      JAX_PLATFORMS: cuda

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JAX with CUDA support
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=2.0" "scipy>=1.13" \
            "jax[cuda12]==0.9.2" pytest monty setuptools-scm

      - name: Generate version file (setuptools-scm)
        run: python -c "from setuptools_scm import get_version; get_version(write_to='src/simsopt/_version.py')"

      # ------------------------------------------------------------------
      # GPU device verification
      # ------------------------------------------------------------------
      - name: Verify JAX sees a GPU device
        run: |
          python -c "
          import jax
          devices = jax.devices()
          print('JAX devices:', devices)
          print('Default backend:', jax.default_backend())
          gpu_devices = [d for d in devices if d.platform == 'gpu']
          assert len(gpu_devices) > 0, (
              f'No GPU devices found. Available: {devices}'
          )
          print(f'GPU count: {len(gpu_devices)}')
          "

      # ------------------------------------------------------------------
      # Core parity test suite
      # Each file runs independently so a failure in one does not skip
      # the rest.  Results are collected at the end.
      # ------------------------------------------------------------------
      - name: Import smoke tests
        id: smoke
        continue-on-error: true
        run: python -m pytest tests/test_jax_import_smoke.py -v --tb=short

      - name: Biot-Savart JAX parity
        id: bs_parity
        continue-on-error: true
        run: python -m pytest tests/field/test_biotsavart_jax_parity.py -v --tb=short

      - name: Biot-Savart JAX unit
        id: bs_unit
        continue-on-error: true
        run: python -m pytest tests/field/test_biotsavart_jax.py -v --tb=short

      - name: Boozer residual JAX
        id: boozer
        continue-on-error: true
        run: python -m pytest tests/geo/test_boozer_residual_jax.py -v --tb=short

      - name: Surface Fourier JAX
        id: surface
        continue-on-error: true
        run: python -m pytest tests/geo/test_surface_fourier_jax.py -v --tb=short

      - name: GPU reproducibility contract
        id: ci_contract
        continue-on-error: true
        run: |
          python scripts/jax_ci_contract.py \
            --platform cuda \
            --output-json benchmark_artifacts/jax_ci_contract.json \
            --output-md benchmark_artifacts/jax_ci_contract.md

      # ------------------------------------------------------------------
      # Summary gate — fail the job if any test step failed
      # ------------------------------------------------------------------
      - name: Check for failures
        if: always()
        run: |
          echo "## GPU Parity Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Import smoke | ${{ steps.smoke.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Biot-Savart parity | ${{ steps.bs_parity.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Biot-Savart unit | ${{ steps.bs_unit.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Boozer residual | ${{ steps.boozer.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Surface Fourier | ${{ steps.surface.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GPU reproducibility contract | ${{ steps.ci_contract.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f benchmark_artifacts/jax_ci_contract.md ]; then
            cat benchmark_artifacts/jax_ci_contract.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Fail the workflow if any test step did not succeed
          if [ "${{ steps.smoke.outcome }}" != "success" ] || \
             [ "${{ steps.bs_parity.outcome }}" != "success" ] || \
             [ "${{ steps.bs_unit.outcome }}" != "success" ] || \
             [ "${{ steps.boozer.outcome }}" != "success" ] || \
             [ "${{ steps.surface.outcome }}" != "success" ] || \
             [ "${{ steps.ci_contract.outcome }}" != "success" ]; then
            echo "One or more GPU parity tests failed."
            exit 1
          fi

      - name: Publish GPU contract artifact
        if: always() && steps.ci_contract.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: jax-gpu-repro-contract
          path: |
            benchmark_artifacts/jax_ci_contract.json
            benchmark_artifacts/jax_ci_contract.md
