name: JAX HF CUDA Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag to publish under ghcr.io/<owner>/simsopt-jax-hf-production-proof"
        required: true
        type: string
  push:
    tags:
      - banana-surface-parity-m7-image-*

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build HF CUDA proof image
    runs-on: ubuntu-24.04
    env:
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/simsopt-jax-hf-production-proof
      IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HF CUDA proof image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: benchmarks/hf_jobs/production_gpu_proof.Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Print image reference
        run: printf '%s\n' "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
