name: JAX H200 Production Proof

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Published CUDA image for the HF proof job"
        required: true
        type: string
      single_stage_warm_start_run_dir:
        description: "Repo-relative warm-start run directory with surf/results/biot_savart JSON"
        required: false
        type: string
      single_stage_jax_runtime_seed_spec:
        description: "Repo-relative runtime seed spec file or directory"
        required: false
        type: string
      timeout:
        description: "HF Jobs timeout"
        required: true
        default: "8h"
        type: string

jobs:
  h200-production-proof:
    name: HF Jobs H200 production proof
    runs-on: ubuntu-latest
    timeout-minutes: 540
    env:
      SIMSOPT_HF_GPU_IMAGE: ${{ inputs.image }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "huggingface_hub>=1.12.0"
          hf --version

      - name: Verify H200 flavor is available
        run: |
          hf jobs hardware | tee hf_jobs_hardware.txt
          grep -E '^h200[[:space:]]' hf_jobs_hardware.txt

      - name: Launch and stream H200 production proof
        env:
          WARM_START_RUN_DIR: ${{ inputs.single_stage_warm_start_run_dir }}
          JAX_RUNTIME_SEED_SPEC: ${{ inputs.single_stage_jax_runtime_seed_spec }}
        run: |
          seed_args=()
          if [[ -n "${WARM_START_RUN_DIR}" ]]; then
            seed_args+=(--single-stage-warm-start-run-dir "${WARM_START_RUN_DIR}")
          fi
          if [[ -n "${JAX_RUNTIME_SEED_SPEC}" ]]; then
            seed_args+=(--single-stage-jax-runtime-seed-spec "${JAX_RUNTIME_SEED_SPEC}")
          fi
          if [[ -n "${WARM_START_RUN_DIR}" && -n "${JAX_RUNTIME_SEED_SPEC}" ]]; then
            echo "Set exactly one single-stage seed input." >&2
            exit 1
          fi
          if [[ "${#seed_args[@]}" -eq 0 ]]; then
            echo "Set single_stage_warm_start_run_dir or single_stage_jax_runtime_seed_spec." >&2
            exit 1
          fi
          python benchmarks/hf_jobs/launch_production_gpu_proof.py \
            --hardware h200 \
            --platform cuda \
            --no-detach \
            --timeout "${{ inputs.timeout }}" \
            --repo-url "https://github.com/${{ github.repository }}.git" \
            --repo-ref "${{ github.ref_name }}" \
            --repo-sha "${{ github.sha }}" \
            "${seed_args[@]}"
