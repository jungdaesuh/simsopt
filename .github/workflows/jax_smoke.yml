jobs:
  jax-public-unit:
    name: JAX public lane (CPU, no simsoptpp)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JAX public-lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=2.0" "scipy>=1.13" \
            jax jaxlib pytest monty setuptools-scm

      - name: Generate version file (setuptools-scm)
        run: python -c "from setuptools_scm import get_version; get_version(write_to='src/simsopt/_version.py')"

      - name: Import smoke tests (real package entrypoints, no simsoptpp)
        run: python -m pytest tests/test_jax_import_smoke.py -v --tb=short

      - name: Audit pytest skip and xfail contracts
        run: python -m pytest tests/test_pytest_skip_xfail_audit.py -v --tb=short

      - name: Collect restored upstream and JAX guardrail tests
        run: |
          python -m pytest --collect-only \
            tests/field/test_selffieldforces.py \
            tests/geo/test_curve_objectives.py \
            tests/geo/test_surface_fourier_jax.py \
            tests/objectives/test_integral_bdotn_jax.py \
            tests/test_backend.py \
            -q
          python -m pytest --collect-only tests/geo/test_curve_objectives.py -q \
            | grep -E "test_arclength_variation_circle_planar|test_linking_number_planar|test_curve_curve_distance_empty_candidates"

      - name: Run public pure-JAX unit tests
        run: |
          python -m pytest \
            tests/field/test_biotsavart_jax.py \
            tests/geo/test_surface_fourier_jax.py \
            tests/geo/test_boozer_residual_jax.py \
            tests/objectives/test_integral_bdotn_jax.py \
            tests/geo/test_boozer_derivatives_jax.py \
            tests/geo/test_boozersurface_jax.py \
            tests/integration/test_jax_native_path.py \
            tests/test_run_code_benchmark_common.py \
            -m "not private_optimizer_runtime" \
            -v --tb=short

      - name: Run CI contract helper tests
        run: |
          python -m pytest tests/test_benchmark_helpers.py \
            -k "jax_ci_contract_ratchet_rel_tol_tightens_without_loosening or jax_ci_contract_reduction_order_probe_tracks_ulp_distance or jax_ci_contract_same_device_probe_requires_bitwise_identity or jax_ci_contract_payload_tracks_ratchet_and_pass_state" \
            -v --tb=short

      - name: Run banana parity manifest guard
        run: python -m pytest tests/docs/test_banana_parity_coverage_manifest.py -v --tb=short

      - name: Run backend and benchmark guard tests
        run: |
          python -m pip install pytest-randomly
          python -m pytest \
            tests/test_backend.py \
            tests/test_biotsavart_donation_probe.py \
            tests/test_field_cache_hot_path_benchmark.py \
            -k "backend_state_restoration_is_explicit_without_test_order or distributed_backend_state_restoration_is_explicit_without_test_order or backend_module_guard_restores_original_backend_modules or force_x64_rejects_silent_config_update_failure or donated_points_kernel_deletes_positional_input or benchmark_compiles_runs_and_writes_structured_json" \
            --randomly-seed=20260425 \
            -v --tb=short

      - name: Verify backend module imports
        run: |
          python -c "
          import importlib.util
          spec = importlib.util.spec_from_file_location(
              'simsopt.backend', 'src/simsopt/backend.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          assert mod.get_backend() == 'cpu'
          assert not mod.is_jax_backend()
          assert mod.get_jax_platform() == 'cpu'
          print('backend module: OK')
          "

  jax-public-guardrails:
    name: JAX guardrail lane (CPU, debug_nans)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      SIMSOPT_BACKEND_MODE: jax_cpu_parity
      SIMSOPT_JAX_DEBUG_NANS: "1"
      SIMSOPT_JAX_TRANSFER_GUARD: "log"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JAX public-lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=2.0" "scipy>=1.13" \
            jax jaxlib pytest monty setuptools-scm

      - name: Generate version file (setuptools-scm)
        run: python -c "from setuptools_scm import get_version; get_version(write_to='src/simsopt/_version.py')"

      - name: Run guardrail import smoke tests
        run: |
          python -m pytest tests/test_jax_import_smoke.py \
            -k "parity_mode_defaults_transfer_guard_and_keeps_x64_enabled or env_selected_guardrails_eagerly_configure_jax_runtime or transfer_guard_disallow_rejects_implicit_host_to_device_jit_inputs" \
            -v --tb=short

      - name: Run debug-nans pure-JAX smoke slice
        run: |
          python -m pytest \
            tests/field/test_biotsavart_jax.py -k "chunked_B_and_dB_match_dense_reference or chunked_A_matches_dense_reference" \
            tests/test_backend.py -k "parity_modes_default_transfer_guard_to_log or backend_mode_policy_helpers or fast_mode_policy_helpers or gpu_parity_mode_exposes_ci_contract_defaults" \
            -v --tb=short

  jax-public-integration:
    name: JAX public lane (with simsoptpp)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libopenmpi-dev \
            libnetcdf-dev liblapack-dev libhdf5-dev libfftw3-dev \
            libboost-all-dev libopenblas-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=2.0" cmake scikit-build ninja wheel setuptools \
            setuptools-scm "scipy>=1.13" jax jaxlib pytest \
            sympy f90nml pyevtk matplotlib ruamel.yaml monty Deprecated pybind11 \
            numba

      - name: Install simsopt (with simsoptpp)
        run: pip install -v -e .

      - name: Run public JAX integration tests
        run: |
          python -m pytest \
            tests/geo/test_boozersurface.py \
            tests/geo/test_simsoptpp_compat.py \
            tests/geo/test_surface_objectives.py \
            tests/integration/test_stage2_jax.py \
            tests/integration/test_single_stage_jax.py \
            tests/geo/test_single_stage_example.py \
            -m "not private_optimizer_runtime" \
            -v --tb=short

      - name: Run strict fallback rejection integration tests
        run: |
          python -m pytest \
            tests/geo/test_boozersurface_jax.py -k "strict_mode or jax_minimize_rejects" \
            tests/integration/test_stage2_jax.py -k "strict_mode_rejects" \
            tests/integration/test_single_stage_jax.py -k "strict_mode" \
            -v --tb=short

      - name: Run flux objective grouped-VJP parity guard
        run: |
          python -m pytest tests/objectives/test_fluxobjective_jax_parity.py \
            -k "squaredfluxjax_large_point_cloud_grouped_vjp_matches_dense or squaredfluxjax_gradient_matches_directional_taylor_fd" \
            -v --tb=short

  jax-gpu-e2e:
    name: JAX GPU e2e smoke (CUDA, ondevice)
    runs-on: [self-hosted, gpu]
    timeout-minutes: 45
    env:
      BENCHMARK_ENV_NAME: jax
      BENCHMARK_ENV_FILE: envs/jax.yml
      SIMSOPT_BACKEND_MODE: jax_gpu_parity
      SIMSOPT_BACKEND_STRICT: "1"
      SIMSOPT_JAX_TRANSFER_GUARD: disallow
      XLA_FLAGS: --xla_gpu_exclude_nondeterministic_ops=true
      JAX_PLATFORMS: cuda
      JAX_ENABLE_X64: "1"
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision GPU e2e environment from recipe
        run: |
          if conda env list | awk '{print $1}' | grep -Fxq "$BENCHMARK_ENV_NAME"; then
            conda env update -n "$BENCHMARK_ENV_NAME" -f "$BENCHMARK_ENV_FILE" --prune
          else
            conda env create -n "$BENCHMARK_ENV_NAME" -f "$BENCHMARK_ENV_FILE"
          fi
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -m pip install -e ".[JAX_GPU,dev]"

      - name: Verify CUDA runtime and x64 contract
        run: |
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -c "import jax; print(jax.devices()); print(jax.default_backend()); assert any(device.platform in {'cuda', 'gpu'} for device in jax.devices()); assert jax.config.jax_enable_x64"

      - name: Run Stage 2 CUDA e2e smoke
        run: |
          mkdir -p benchmark_artifacts
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python benchmarks/stage2_e2e_comparison.py \
            --platform cuda \
            --optimizer-backend ondevice \
            --maxiter 20 \
            --output-json benchmark_artifacts/stage2_e2e_cuda.json

      - name: Run single-stage CUDA init parity smoke
        run: |
          mkdir -p benchmark_artifacts
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python benchmarks/single_stage_init_parity.py \
            --platform cuda \
            --optimizer-backend ondevice \
            --benchmark-mode \
            --output-json benchmark_artifacts/single_stage_init_cuda.json

      - name: Publish CUDA e2e smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jax-gpu-e2e-smoke
          if-no-files-found: ignore
          path: |
            benchmark_artifacts/stage2_e2e_cuda.json
            benchmark_artifacts/single_stage_init_cuda.json

  jax-gpu-strict-purity:
    name: JAX GPU strict purity (CUDA, transfer_guard=disallow)
    runs-on: [self-hosted, gpu]
    timeout-minutes: 60
    env:
      BENCHMARK_ENV_NAME: jax
      BENCHMARK_ENV_FILE: envs/jax.yml
      SIMSOPT_BACKEND_MODE: jax_gpu_parity
      SIMSOPT_BACKEND_STRICT: "1"
      SIMSOPT_JAX_TRANSFER_GUARD: disallow
      XLA_FLAGS: --xla_gpu_exclude_nondeterministic_ops=true
      JAX_PLATFORMS: cuda
      JAX_ENABLE_X64: "1"
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision GPU strict-purity environment from recipe
        run: |
          if conda env list | awk '{print $1}' | grep -Fxq "$BENCHMARK_ENV_NAME"; then
            conda env update -n "$BENCHMARK_ENV_NAME" -f "$BENCHMARK_ENV_FILE" --prune
          else
            conda env create -n "$BENCHMARK_ENV_NAME" -f "$BENCHMARK_ENV_FILE"
          fi
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -m pip install -e ".[JAX_GPU,dev]"

      - name: Verify CUDA runtime and x64 contract
        run: |
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -c "import jax; print(jax.devices()); print(jax.default_backend()); assert any(device.platform in {'cuda', 'gpu'} for device in jax.devices()); assert jax.config.jax_enable_x64"

      - name: Run CUDA strict transfer-guard smoke slice
        run: |
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -m pytest tests/test_jax_import_smoke.py \
            -k "gpu_ondevice_loops_with_host_constants or grouped_biot_savart_gpu_spec_eval or grouped_biot_savart_gpu_current_arrays or stage2_target_objective_ondevice_entry" \
            -v --tb=short

      - name: Run BoozerSurfaceJAX CUDA inner-solve tests
        run: |
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -m pytest tests/geo/test_boozersurface_jax.py \
            -k "run_code_traceable_exact_executes_inner_solve_on_gpu or run_code_traceable_lm_ondevice_executes_inner_solve_on_gpu" \
            -v --tb=short

      - name: Run reduced real-fixture and production-scale CUDA parity tests
        run: |
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -m pytest tests/integration/test_single_stage_jax_cpu_reference.py \
            -k "TestRealFixtureGpuM5Parity or test_ls_solve_parity_production_scale_gpu_under_disallow" \
            -v --tb=short

      - name: Run single-stage outer-loop CUDA proof test
        run: |
          conda run --no-capture-output -n "$BENCHMARK_ENV_NAME" \
            python -m pytest tests/integration/test_single_stage_physics_parity.py \
            -k "TestSingleStageOuterLoopGpuProof" \
            -v --tb=short

  jax-private-optimizer:
    name: JAX private optimizer lane (with simsoptpp)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libopenmpi-dev \
            libnetcdf-dev liblapack-dev libhdf5-dev libfftw3-dev \
            libboost-all-dev libopenblas-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=2.0" cmake scikit-build ninja wheel setuptools setuptools-scm \
            "scipy>=1.13" jax jaxlib pytest sympy f90nml pyevtk matplotlib \
            ruamel.yaml monty Deprecated pybind11 numba

      - name: Install simsopt (with simsoptpp)
        run: pip install -v -e .

      - name: Run accessibility FD/Hessian tests
        run: python -m pytest tests/geo/test_accessibility.py -v --tb=short

      - name: Run private optimizer tests
        run: |
          python -m pytest \
            tests/geo/test_boozersurface_jax.py \
            tests/integration/test_single_stage_jax.py \
            -m "private_optimizer_runtime" \
            -v --tb=short

  jax-lint:
    name: Lint JAX modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check JAX modules
        run: |
          ruff check \
            src/simsopt/backend.py \
            src/simsopt/backend/__init__.py \
            src/simsopt/backend/runtime.py \
            src/simsopt/field/biotsavart_jax.py \
            src/simsopt/field/biotsavart_jax_backend.py \
            src/simsopt/jax_core/__init__.py \
            src/simsopt/jax_core/biotsavart.py \
            src/simsopt/jax_core/field.py \
            src/simsopt/geo/surface_fourier_jax.py \
            src/simsopt/geo/boozer_residual_jax.py \
            src/simsopt/geo/boozersurface_jax.py \
            src/simsopt/geo/surfaceobjectives_jax.py \
            src/simsopt/geo/label_constraints_jax.py \
            src/simsopt/geo/optimizer_jax.py \
            src/simsopt/objectives/fluxobjective_jax.py \
            src/simsopt/objectives/integral_bdotn_jax.py

      - name: Check JAX where-division guards
        run: |
          python scripts/jax_where_division_lint.py \
            src/simsopt/backend.py \
            src/simsopt/backend/__init__.py \
            src/simsopt/backend/runtime.py \
            src/simsopt/field/biotsavart_jax.py \
            src/simsopt/field/biotsavart_jax_backend.py \
            src/simsopt/jax_core/__init__.py \
            src/simsopt/jax_core/biotsavart.py \
            src/simsopt/jax_core/field.py \
            src/simsopt/geo/surface_fourier_jax.py \
            src/simsopt/geo/boozer_residual_jax.py \
            src/simsopt/geo/boozersurface_jax.py \
            src/simsopt/geo/surfaceobjectives_jax.py \
            src/simsopt/geo/label_constraints_jax.py \
            src/simsopt/geo/optimizer_jax.py \
            src/simsopt/objectives/fluxobjective_jax.py \
            src/simsopt/objectives/integral_bdotn_jax.py

      - name: Ruff format check
        run: |
          ruff format --check \
            src/simsopt/backend.py \
            src/simsopt/backend/__init__.py \
            src/simsopt/backend/runtime.py \
            src/simsopt/field/biotsavart_jax.py \
            src/simsopt/field/biotsavart_jax_backend.py \
            src/simsopt/jax_core/__init__.py \
            src/simsopt/jax_core/biotsavart.py \
